<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>USDJPY Historical Chart</title>

  <!-- TradingView Lightweight Charts -->
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg: #05070b;
      --panel: #0b1118;
      --panel2: #101821;
      --border: #1d2a38;
      --text: #d7e1ea;
      --muted: #7f8fa3;
      --accent: #00e5a0;
      --accent2: #3b82f6;
      --gold: #f59e0b;
      --red: #f43f5e;
      --green: #00c287;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      background: radial-gradient(circle at top left, rgba(0,229,160,0.05), transparent 32%),
                  radial-gradient(circle at top right, rgba(59,130,246,0.045), transparent 36%);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(5,7,11,0.92);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 210px;
    }

    .brand-title {
      font-size: 15px;
      letter-spacing: 0.12em;
      font-weight: 800;
      color: #fff;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }

    select,
    button {
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 0 10px;
      font-size: 12px;
      outline: none;
    }

    select:focus,
    button:focus { border-color: var(--accent); }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: background .15s ease, border-color .15s ease, transform .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: var(--panel2);
      border-color: var(--accent);
    }

    .btn-primary {
      background: rgba(0,229,160,0.10);
      border-color: rgba(0,229,160,0.35);
      color: var(--accent);
    }

    .btn-ghost { color: var(--muted); }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 260px;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
    }

    .dot.ok {
      background: var(--accent);
      box-shadow: 0 0 12px rgba(0,229,160,0.35);
    }

    .dot.err {
      background: var(--red);
      box-shadow: 0 0 12px rgba(244,63,94,0.35);
    }

    .info-row {
      display: grid;
      grid-template-columns: repeat(8, minmax(88px, 1fr));
      gap: 1px;
      border-bottom: 1px solid var(--border);
      background: var(--border);
    }

    .info-cell {
      background: rgba(11,17,24,0.92);
      padding: 8px 10px;
      min-height: 48px;
    }

    .info-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .info-value {
      font-size: 14px;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 700;
    }

    .info-value.up { color: var(--green); }
    .info-value.down { color: var(--red); }

    #chartWrap {
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    #chart {
      position: absolute;
      inset: 0;
    }

    .loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      background: rgba(5,7,11,0.88);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      min-width: 280px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      display: none;
    }

    .loading.show { display: block; }

    .loading-title {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .loading-text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 14px;
      color: rgba(127,143,163,0.75);
      border-top: 1px solid var(--border);
      background: rgba(5,7,11,0.92);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .footer b {
      color: var(--accent);
      font-weight: 700;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }

      #app {
        min-height: 100vh;
        height: auto;
        grid-template-rows: auto auto 72vh auto;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .brand { min-width: 0; }

      .status {
        min-width: 0;
        justify-content: flex-start;
      }

      .info-row { grid-template-columns: repeat(2, 1fr); }
      .footer { flex-direction: column; }
    }
  </style>
</head>

<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">USDJPY CHART</div>
      <div class="brand-sub">Historical Viewer</div>
    </div>

    <div class="controls">
      <select id="sideSelect" title="Bid / Ask">
        <option value="Bid">Bid</option>
        <option value="Ask">Ask</option>
      </select>

      <select id="yearSelect" title="Year">
        <option value="2025" selected>2025</option>
        <option value="2024">2024</option>
      </select>

      <select id="monthSelect" title="Month">
        <option value="all">Full Year</option>
        <option value="01">Jan</option>
        <option value="02">Feb</option>
        <option value="03">Mar</option>
        <option value="04">Apr</option>
        <option value="05">May</option>
        <option value="06">Jun</option>
        <option value="07">Jul</option>
        <option value="08">Aug</option>
        <option value="09">Sep</option>
        <option value="10">Oct</option>
        <option value="11">Nov</option>
        <option value="12" selected>Dec</option>
      </select>

      <select id="tfSelect" title="Timeframe">
        <option value="1">1m</option>
        <option value="5" selected>5m</option>
        <option value="15">15m</option>
        <option value="60">1h</option>
        <option value="1440">1d</option>
      </select>

      <button class="btn-primary" id="loadBtn">Load</button>
      <button class="btn-ghost" id="latestBtn">Latest</button>
      <button class="btn-ghost" id="fitBtn">Fit</button>
    </div>

    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>
  </header>

  <section class="info-row">
    <div class="info-cell">
      <div class="info-label">Symbol</div>
      <div class="info-value" id="infoSymbol">USDJPY</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Date Time JST</div>
      <div class="info-value" id="infoTime">-</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Open</div>
      <div class="info-value" id="infoOpen">-</div>
    </div>
    <div class="info-cell">
      <div class="info-label">High</div>
      <div class="info-value" id="infoHigh">-</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Low</div>
      <div class="info-value" id="infoLow">-</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Close</div>
      <div class="info-value" id="infoClose">-</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Change</div>
      <div class="info-value" id="infoChange">-</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Candles</div>
      <div class="info-value" id="infoCount">-</div>
    </div>
  </section>

  <main id="chartWrap">
    <div id="chart"></div>

    <div class="loading" id="loadingBox">
      <div class="loading-title">LOADING DATA</div>
      <div class="loading-text" id="loadingText">Fetching CSV...</div>
    </div>
  </main>

  <footer class="footer">
    <div>Data path: <b>data/usdjpy/USDJPY_1 Min_[Bid/Ask]_YYYY.01.01_YYYY.12.31.csv</b></div>
    <div>Mouse wheel zoom · Drag to pan · Time is displayed as JST</div>
  </footer>
</div>

<script>
  const DATA_BASE = "data/usdjpy/";
  const cache = new Map();

  const els = {
    side: document.getElementById("sideSelect"),
    year: document.getElementById("yearSelect"),
    month: document.getElementById("monthSelect"),
    tf: document.getElementById("tfSelect"),
    loadBtn: document.getElementById("loadBtn"),
    latestBtn: document.getElementById("latestBtn"),
    fitBtn: document.getElementById("fitBtn"),
    statusDot: document.getElementById("statusDot"),
    statusText: document.getElementById("statusText"),
    loadingBox: document.getElementById("loadingBox"),
    loadingText: document.getElementById("loadingText"),
    chart: document.getElementById("chart"),
    chartWrap: document.getElementById("chartWrap"),
    infoSymbol: document.getElementById("infoSymbol"),
    infoTime: document.getElementById("infoTime"),
    infoOpen: document.getElementById("infoOpen"),
    infoHigh: document.getElementById("infoHigh"),
    infoLow: document.getElementById("infoLow"),
    infoClose: document.getElementById("infoClose"),
    infoChange: document.getElementById("infoChange"),
    infoCount: document.getElementById("infoCount")
  };

  let chart;
  let candleSeries;
  let currentData = [];
  let resizeObserver;

  function setStatus(text, type = "") {
    els.statusText.textContent = text;
    els.statusDot.classList.remove("ok", "err");
    if (type === "ok") els.statusDot.classList.add("ok");
    if (type === "err") els.statusDot.classList.add("err");
  }

  function setLoading(show, text = "") {
    els.loadingBox.classList.toggle("show", show);
    if (text) els.loadingText.textContent = text;
  }

  function buildFileName(side, year) {
    return `USDJPY_1 Min_${side}_${year}.01.01_${year}.12.31.csv`;
  }

  function buildDataUrl(side, year) {
    const fileName = buildFileName(side, year);
    return DATA_BASE + encodeURIComponent(fileName);
  }

  function parseTokyoTimeToUtcSeconds(value) {
    const m = String(value || "").trim().match(/^(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})[ T](\d{1,2}):(\d{2})(?::(\d{2}))?/);
    if (!m) return null;

    const y = Number(m[1]);
    const mo = Number(m[2]);
    const d = Number(m[3]);
    const h = Number(m[4]);
    const mi = Number(m[5]);
    const s = Number(m[6] || 0);

    // JST = UTC + 9. Convert JST wall time to UTC timestamp.
    return Math.floor(Date.UTC(y, mo - 1, d, h - 9, mi, s) / 1000);
  }

  function formatJstTime(seconds) {
    const d = new Date((seconds + 9 * 3600) * 1000);
    const y = d.getUTCFullYear();
    const mo = String(d.getUTCMonth() + 1).padStart(2, "0");
    const day = String(d.getUTCDate()).padStart(2, "0");
    const h = String(d.getUTCHours()).padStart(2, "0");
    const mi = String(d.getUTCMinutes()).padStart(2, "0");
    return `${y}-${mo}-${day} ${h}:${mi}`;
  }

  function detectDelimiter(headerLine) {
    if (headerLine.includes("\t")) return "\t";
    if (headerLine.includes(",")) return ",";
    if (headerLine.includes(";")) return ";";
    return "\t";
  }

  function parseCsvText(text) {
    const lines = text.split(/\r?\n/).filter(Boolean);
    if (lines.length < 2) throw new Error("CSV file is empty.");

    const delimiter = detectDelimiter(lines[0]);
    const headers = lines[0].split(delimiter).map(h => h.replace(/^\uFEFF/, "").trim());

    const timeIdx = headers.indexOf("Time (Asia/Tokyo)");
    const openIdx = headers.indexOf("Open");
    const highIdx = headers.indexOf("High");
    const lowIdx = headers.indexOf("Low");
    const closeIdx = headers.indexOf("Close");

    if ([timeIdx, openIdx, highIdx, lowIdx, closeIdx].some(i => i < 0)) {
      throw new Error("Required columns not found. Required: Time (Asia/Tokyo), Open, High, Low, Close.");
    }

    const data = [];

    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;

      const parts = line.split(delimiter);
      if (parts.length < 5) continue;

      const time = parseTokyoTimeToUtcSeconds(parts[timeIdx]);
      const open = Number(parts[openIdx]);
      const high = Number(parts[highIdx]);
      const low = Number(parts[lowIdx]);
      const close = Number(parts[closeIdx]);

      if (!time || !Number.isFinite(open) || !Number.isFinite(high) || !Number.isFinite(low) || !Number.isFinite(close)) continue;

      data.push({ time, open, high, low, close });
    }

    data.sort((a, b) => a.time - b.time);
    return data;
  }

  async function fetchYearData(side, year) {
    const key = `${side}-${year}`;
    if (cache.has(key)) return cache.get(key);

    const url = buildDataUrl(side, year);
    setLoading(true, `Fetching ${buildFileName(side, year)}...`);
    setStatus(`Loading ${side} ${year}...`);

    const response = await fetch(url, { cache: "force-cache" });
    if (!response.ok) throw new Error(`Could not load ${url}. HTTP ${response.status}`);

    setLoading(true, "Parsing CSV...");
    const text = await response.text();

    setLoading(true, "Building candles...");
    const data = parseCsvText(text);
    if (!data.length) throw new Error("No valid candle rows were parsed.");

    cache.set(key, data);
    return data;
  }

  function filterByMonth(data, monthValue) {
    if (monthValue === "all") return data;
    const month = Number(monthValue);

    return data.filter(c => {
      const d = new Date((c.time + 9 * 3600) * 1000);
      return d.getUTCMonth() + 1 === month;
    });
  }

  function aggregateCandles(data, timeframeMinutes) {
    if (timeframeMinutes === 1) return data;

    const period = timeframeMinutes * 60;
    const buckets = new Map();

    for (const c of data) {
      const bucketTime = Math.floor(c.time / period) * period;
      let b = buckets.get(bucketTime);

      if (!b) {
        b = { time: bucketTime, open: c.open, high: c.high, low: c.low, close: c.close };
        buckets.set(bucketTime, b);
      } else {
        b.high = Math.max(b.high, c.high);
        b.low = Math.min(b.low, c.low);
        b.close = c.close;
      }
    }

    return Array.from(buckets.values()).sort((a, b) => a.time - b.time);
  }

  function formatPrice(value) {
    if (!Number.isFinite(value)) return "-";
    return value.toFixed(3);
  }

  function updateInfo(candle, dataLength = currentData.length) {
    if (!candle) {
      els.infoTime.textContent = "-";
      els.infoOpen.textContent = "-";
      els.infoHigh.textContent = "-";
      els.infoLow.textContent = "-";
      els.infoClose.textContent = "-";
      els.infoChange.textContent = "-";
      els.infoChange.className = "info-value";
      els.infoCount.textContent = dataLength ? String(dataLength) : "-";
      return;
    }

    const change = candle.close - candle.open;

    els.infoTime.textContent = formatJstTime(candle.time);
    els.infoOpen.textContent = formatPrice(candle.open);
    els.infoHigh.textContent = formatPrice(candle.high);
    els.infoLow.textContent = formatPrice(candle.low);
    els.infoClose.textContent = formatPrice(candle.close);
    els.infoChange.textContent = `${change >= 0 ? "+" : ""}${change.toFixed(3)}`;
    els.infoChange.className = "info-value " + (change >= 0 ? "up" : "down");
    els.infoCount.textContent = String(dataLength);
  }

  function makeChart() {
    chart = LightweightCharts.createChart(els.chart, {
      layout: {
        background: { color: "#05070b" },
        textColor: "#b9c5d3",
        fontSize: 12,
        fontFamily: 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
      },
      grid: {
        vertLines: { color: "rgba(127,143,163,0.12)" },
        horzLines: { color: "rgba(127,143,163,0.12)" }
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine: {
          color: "rgba(255,255,255,0.55)",
          width: 1,
          style: LightweightCharts.LineStyle.Dashed,
          labelBackgroundColor: "#101821"
        },
        horzLine: {
          color: "rgba(255,255,255,0.45)",
          width: 1,
          style: LightweightCharts.LineStyle.Dashed,
          labelBackgroundColor: "#101821"
        }
      },
      rightPriceScale: {
        borderColor: "rgba(127,143,163,0.25)",
        scaleMargins: { top: 0.08, bottom: 0.08 }
      },
      timeScale: {
        borderColor: "rgba(127,143,163,0.25)",
        timeVisible: true,
        secondsVisible: false,
        rightOffset: 8,
        barSpacing: 6,
        tickMarkFormatter: (time) => formatJstTime(time).slice(5)
      },
      localization: { timeFormatter: (time) => formatJstTime(time) },
      handleScroll: {
        mouseWheel: true,
        pressedMouseMove: true,
        horzTouchDrag: true,
        vertTouchDrag: false
      },
      handleScale: {
        axisPressedMouseMove: true,
        mouseWheel: true,
        pinch: true
      }
    });

    candleSeries = chart.addCandlestickSeries({
      upColor: "#dfe7ef",
      downColor: "#05070b",
      borderUpColor: "#dfe7ef",
      borderDownColor: "#dfe7ef",
      wickUpColor: "#dfe7ef",
      wickDownColor: "#dfe7ef",
      priceFormat: { type: "price", precision: 3, minMove: 0.001 }
    });

    chart.subscribeCrosshairMove(param => {
      if (!param || !param.time || !param.seriesData) {
        updateInfo(currentData[currentData.length - 1] || null);
        return;
      }

      const candle = param.seriesData.get(candleSeries);
      if (candle) updateInfo({ time: param.time, ...candle });
    });

    resizeObserver = new ResizeObserver(entries => {
      const rect = entries[0].contentRect;
      chart.applyOptions({ width: Math.floor(rect.width), height: Math.floor(rect.height) });
    });

    resizeObserver.observe(els.chartWrap);
  }

  async function loadSelected() {
    const side = els.side.value;
    const year = els.year.value;
    const month = els.month.value;
    const tf = Number(els.tf.value);

    try {
      setLoading(true);
      const raw = await fetchYearData(side, year);

      setLoading(true, "Filtering range...");
      const filtered = filterByMonth(raw, month);

      const tfText = tf === 1440 ? "1D" : tf === 60 ? "1H" : `${tf}M`;
      setLoading(true, `Aggregating ${tfText} candles...`);
      const data = aggregateCandles(filtered, tf);

      if (!data.length) throw new Error("No candles in the selected range.");

      currentData = data;
      candleSeries.setData(data);
      chart.timeScale().fitContent();

      const sideText = side.toUpperCase();
      const monthText = month === "all" ? "Full Year" : `${year}-${month}`;

      els.infoSymbol.textContent = `USDJPY ${sideText} ${tfText}`;
      updateInfo(data[data.length - 1], data.length);
      setStatus(`${sideText} ${monthText} ${tfText} · ${data.length} candles`, "ok");
    } catch (error) {
      console.error(error);
      setStatus(error.message, "err");
      alert(error.message);
    } finally {
      setLoading(false);
    }
  }

  function goLatest() {
    if (!currentData.length) return;
    const length = currentData.length;
    const from = Math.max(0, length - 220);
    chart.timeScale().setVisibleLogicalRange({ from, to: length + 10 });
  }

  function fitContent() {
    if (!currentData.length) return;
    chart.timeScale().fitContent();
  }

  els.loadBtn.addEventListener("click", loadSelected);
  els.latestBtn.addEventListener("click", goLatest);
  els.fitBtn.addEventListener("click", fitContent);

  document.addEventListener("keydown", event => {
    if (event.key.toLowerCase() === "l") loadSelected();
    if (event.key.toLowerCase() === "f") fitContent();
  });

  makeChart();

  // Default load: 2025 Bid December 5m
  loadSelected().then(() => goLatest());
</script>
</body>
</html>
